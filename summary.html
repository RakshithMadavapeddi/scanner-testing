<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summary</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      color: #1e1e1e;
    }

    .screen {
      min-height: 100vh;
      background: #f2f2f2;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: #ffffff;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.30), 0 1px 3px 1px rgba(0, 0, 0, 0.15);
    }

    .topbar h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
    }

    .content {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 4px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.30), 0 1px 3px 1px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .summary-list {
      padding: 24px 16px;
    }

    .summary-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0;
    }

    .summary-row + .summary-row {
      border-top: 1px solid #d9d9d9;
      margin-top: 12px;
      padding-top: 12px;
    }

    .game-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .game-title,
    .metric-label,
    .total-label {
      font-size: 16px;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin: 0;
      color: #000000;
    }

    .bundle-id,
    .metric-value,
    .total-value {
      font-size: 16px;
      line-height: 1;
      font-weight: 400;
      margin: 0;
      color: #1e1e1e;
    }

    .metrics {
      display: flex;
      align-items: center;
      gap: 24px;
      white-space: nowrap;
    }

    .metric {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 36px;
    }

    .total-card {
      padding: 24px 16px;
    }

    .total-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .bottom-bar {
      background: #ffffff;
      padding: 24px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.30), 0 1px 3px 1px rgba(0, 0, 0, 0.15);
    }

    .done-button {
      width: 100%;
      background: #000000;
      color: #f5f5f5;
      border: 1px solid #000000;
      border-radius: 4px;
      padding: 12px;
      font-size: 16px;
      line-height: 1;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="screen">
    <header class="topbar">
      <h1>Summary</h1>
    </header>

    <section class="content">
      <div class="card summary-list">
        <div class="summary-row">
          <div class="game-info">
            <p class="game-title">Game Title</p>
            <p class="bundle-id">Bundle ID</p>
          </div>
          <div class="metrics">
            <div class="metric">
              <p class="metric-label">Unit</p>
              <p class="metric-value">000</p>
            </div>
            <div class="metric">
              <p class="metric-label">Qty</p>
              <p class="metric-value">000</p>
            </div>
            <div class="metric">
              <p class="metric-label">Total</p>
              <p class="metric-value">0000</p>
            </div>
          </div>
        </div>

        <div class="summary-row">
          <div class="game-info">
            <p class="game-title">Game Title</p>
            <p class="bundle-id">Bundle ID</p>
          </div>
          <div class="metrics">
            <div class="metric">
              <p class="metric-label">Unit</p>
              <p class="metric-value">000</p>
            </div>
            <div class="metric">
              <p class="metric-label">Qty</p>
              <p class="metric-value">000</p>
            </div>
            <div class="metric">
              <p class="metric-label">Total</p>
              <p class="metric-value">0000</p>
            </div>
          </div>
        </div>

        <div class="summary-row">
          <div class="game-info">
            <p class="game-title">Game Title</p>
            <p class="bundle-id">Bundle ID</p>
          </div>
          <div class="metrics">
            <div class="metric">
              <p class="metric-label">Unit</p>
              <p class="metric-value">000</p>
            </div>
            <div class="metric">
              <p class="metric-label">Qty</p>
              <p class="metric-value">000</p>
            </div>
            <div class="metric">
              <p class="metric-label">Total</p>
              <p class="metric-value">0000</p>
            </div>
          </div>
        </div>

        <div class="summary-row">
          <div class="game-info">
            <p class="game-title">Game Title</p>
            <p class="bundle-id">Bundle ID</p>
          </div>
          <div class="metrics">
            <div class="metric">
              <p class="metric-label">Unit</p>
              <p class="metric-value">000</p>
            </div>
            <div class="metric">
              <p class="metric-label">Qty</p>
              <p class="metric-value">000</p>
            </div>
            <div class="metric">
              <p class="metric-label">Total</p>
              <p class="metric-value">0000</p>
            </div>
          </div>
        </div>
      </div>

      <div class="card total-card">
        <div class="total-row">
          <p class="total-label">Total Amount</p>
          <p class="total-value">$ 000000</p>
        </div>
      </div>
    </section>

    <footer class="bottom-bar">
      <div class="done-button">Done</div>
    </footer>
  </main>
</body>
</html>
