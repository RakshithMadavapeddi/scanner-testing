<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket Reconciliation Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      color: #1e1e1e;
    }

    .dashboard {
      width: 100%;
      min-height: 100vh;
      background: #f2f2f2;
    }

    .topbar {
      width: 100%;
      background: #ffffff;
      padding: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      position: relative;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 3px 1px rgba(0, 0, 0, 0.15);
    }

    .topbar h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
      text-align: center;
    }

    .refresh-button {
      position: absolute;
      right: 24px;
      top: 50%;
      border: none;
      transform: translateY(-50%);
      border-radius: 4px;
      background: #ffffff;
      font-size: 12px;
      cursor: pointer;
    }

    .content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 393px;
      margin: 0 auto;
    }

    .card {
      width: 100%;
      min-height: 120px;
      border: 1px solid #d1d1d1;
      border-radius: 8px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 3px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .card.actionable {
      cursor: pointer;
    }

    .card.actionable:focus-visible {
      outline: 2px solid #007bff;
      outline-offset: 2px;
    }

    .card.muted {
      background: #d9d9d9;
    }

    .card-label {
      margin: 0;
      font-size: 16px;
      line-height: 1.4;
      font-weight: 600;
    }

    .footer {
      margin-top: 0;
      font-size: 16px;
      line-height: 1.2;
      color: #b3b3b3;
    }

    .button{
      border: none;
      background: none;
      padding: 0;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <header class="topbar">
      <h1>Ticket Reconciliation</h1>
      <button class="refresh-button" id="resetFlowThreeButton" type="button" aria-label="Reset Flow 02 and Flow 03">
        <img src="assets/cached.svg" alt="Reset flows" width="22" height="16">
      </button>
    </header>

    <section class="content">
      <div class="card"><p class="card-label">Flow 01</p></div>
      <div class="card actionable" id="flow02Card" role="button" tabindex="0" aria-label="Open Flow 02"><p class="card-label">Flow 02</p></div>
      <div class="card actionable" id="flow03Card" role="button" tabindex="0" aria-label="Open Flow 03"><p class="card-label">Flow 03</p></div>
      <div class="card muted"><p class="card-label">Button</p></div>
      <div class="card muted"><p class="card-label">Button</p></div>

      <div class="footer">Built for testing various options.</div>
    </section>
  </main>

  <script>
    (function () {
      var FLOW_THREE_STORAGE_KEY = 'flowThree.ticketState.v1';
      var FLOW_TWO_STORAGE_KEY = 'flowTwo.scannedItems.v1';
      var flow02Card = document.getElementById('flow02Card');
      var flow03Card = document.getElementById('flow03Card');
      var resetFlowThreeButton = document.getElementById('resetFlowThreeButton');

      function resetFlowThreeState() {
        window.localStorage.removeItem(FLOW_THREE_STORAGE_KEY);
        window.localStorage.removeItem(FLOW_TWO_STORAGE_KEY);
        window.alert('Flow 02 and Flow 03 have been reset.');
      }

      if (resetFlowThreeButton) {
        resetFlowThreeButton.addEventListener('click', resetFlowThreeState);
      }

      if (flow02Card) {
        flow02Card.addEventListener('click', function () {
          window.location.href = 'flowTwo.html';
        });

        flow02Card.addEventListener('keydown', function (event) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            window.location.href = 'flowTwo.html';
          }
        });
      }

      if (!flow03Card) {
        return;
      }

      function openFlowThree() {
        window.location.href = 'flowThree.html';
      }

      flow03Card.addEventListener('click', openFlowThree);
      flow03Card.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          openFlowThree();
        }
      });
    })();
  </script>
</body>
</html>
