<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket Reconciliation Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      color: #1e1e1e;
    }

    .dashboard {
      width: 100%;
      min-height: 100vh;
      background: #f2f2f2;
    }

    .topbar {
      width: 100%;
      background: #ffffff;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 3px 1px rgba(0, 0, 0, 0.15);
    }

    .topbar h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
      text-align: center;
    }

    .content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 393px;
      margin: 0 auto;
    }

    .card {
      width: 100%;
      min-height: 120px;
      border: 1px solid #d1d1d1;
      border-radius: 8px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 3px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .card.muted {
      background: #d9d9d9;
    }

    .card-label {
      margin: 0;
      font-size: 16px;
      line-height: 1.4;
      font-weight: 600;
    }

    .footer {
      margin-top: 0;
      font-size: 16px;
      line-height: 1.2;
      color: #b3b3b3;
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <header class="topbar">
      <h1>Ticket Reconciliation</h1>
    </header>

    <section class="content">
      <div class="card"><p class="card-label">Flow 01</p></div>
      <div class="card"><p class="card-label">Flow 02</p></div>
      <div class="card"><p class="card-label">Flow 03</p></div>
      <div class="card muted"><p class="card-label">Button</p></div>
      <div class="card muted"><p class="card-label">Button</p></div>

      <div class="footer">Built for testing various options.</div>
    </section>
  </main>
</body>
</html>
